services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: locomarket
      POSTGRES_USER: locomarket
      POSTGRES_PASSWORD: locomarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locomarket -d locomarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Optional: docker compose --profile full up --build
  backend:
    profiles: ["full"]
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: dev-secret-key
      DEBUG: "True"
      DB_NAME: locomarket
      DB_USER: locomarket
      DB_PASSWORD: locomarket
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"

volumes:
  postgres_data:
  media_data:
